name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      # tests/conftest.py already defaults this, but set it explicitly
      # here too so CI doesn't rely on that default silently staying in
      # sync with what a real (headless) runner actually needs.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PySide6 needs a handful of system shared libraries present even
      # under the offscreen QPA platform (no real display needed, but Qt
      # itself still links against these) — a bare ubuntu-latest runner
      # doesn't have them by default.
      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Run tests
        run: pytest

  build:
    # A separate job from `test`, on a single Python version rather than
    # the full matrix — this only needs to catch a pyproject.toml/
    # packaging mistake that `pip install -e .` (editable, what `test`
    # actually exercises) wouldn't, not re-verify behavior per interpreter.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Install the built wheel into a clean venv
        run: |
          python -m venv /tmp/take-note-build-check
          /tmp/take-note-build-check/bin/pip install dist/*.whl
          /tmp/take-note-build-check/bin/python -c "import take_note"

  coverage:
    # Only on a real push to main, not PRs (a fork's PR run has no push
    # access to commit the badge back) or tag pushes (a tag always
    # points at an already-measured main commit, so re-measuring and
    # re-committing there would be redundant).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1 libfreetype6

      - name: Install dependencies
        run: pip install -e . pytest pytest-cov "genbadge[coverage]"

      - name: Run tests with coverage
        run: pytest --cov=take_note --cov-report=xml

      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o coverage.svg

      # No third-party badge service — the badge itself is generated
      # entirely above, from this run's own coverage.xml. This step just
      # publishes that static SVG somewhere the README's <img> tag can
      # point at, via a dedicated orphan branch (kept separate from
      # main's own history, which otherwise has nothing to do with a
      # generated binary asset).
      - name: Commit badge to the coverage-badge branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Move the freshly-generated badge out of the working tree
          # before switching branches below — if coverage-badge already
          # exists with its own tracked coverage.svg, checking it out
          # while an untracked coverage.svg from this run is still
          # sitting in the working tree would fail (git refuses to
          # overwrite untracked files on checkout).
          mv coverage.svg /tmp/coverage.svg
          git fetch origin coverage-badge --depth=1 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/coverage-badge; then
            git checkout coverage-badge
          else
            git checkout --orphan coverage-badge
          fi
          git rm -rf . >/dev/null 2>&1 || true
          mv /tmp/coverage.svg coverage.svg
          git add coverage.svg
          git diff --cached --quiet && echo "coverage unchanged, nothing to commit" || git commit -m "Update coverage badge"
          git push origin coverage-badge
